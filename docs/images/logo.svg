<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fee2e2" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded background -->
  <rect x="6" y="6" width="128" height="128" rx="30" fill="url(#bg)"/>

  <!-- soft inner ring -->
  <circle cx="70" cy="70" r="48" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- mic body -->
  <rect x="58" y="38" width="24" height="44" rx="12" fill="url(#mic)" filter="url(#glow)"/>

  <!-- mic stand arc -->
  <path d="M44 70 a26 26 0 0 0 52 0" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- mic stem + base -->
  <line x1="70" y1="96" x2="70" y2="108" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="58" y1="108" x2="82" y2="108" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- recording dot -->
  <circle cx="100" cy="40" r="7" fill="#ffffff"/>
  <circle cx="100" cy="40" r="4" fill="#ef4444"/>
</svg>
