name: Hlopya
options:
  bundleIdPrefix: com.vadims
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.7.9
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0

targets:
  Hlopya:
    type: application
    platform: macOS
    sources: Hlopya
    settings:
      base:
        INFOPLIST_FILE: Hlopya/Info.plist
        CODE_SIGN_ENTITLEMENTS: Hlopya/Hlopya.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.vadims.hlopya
        MARKETING_VERSION: 2.9.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        # Default: ad-hoc signing so anyone can clone + `make install` without a
        # paid Apple Developer account. `make sign-notarize` overrides these with
        # the Developer ID identity for signed/notarized release builds.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
    dependencies:
      - package: FluidAudio
      - package: Yams
      - package: Sparkle
    entitlements:
      path: Hlopya/Hlopya.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.app-sandbox: false
